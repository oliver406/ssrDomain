proxy-groups: #!replace
  # ===== 总入口 =====
  - name: 🚀 节点选择
    type: select
    proxies:
      - ♻️ 自动选择
      - 🇸🇬 狮城节点
      - 🇺🇸 美国节点
      - 🇭🇰 香港节点
      - 🇯🇵 日本节点
      - 🇨🇳 台湾节点
      - 🇰🇷 韩国节点
      - 🌍 其他国家节点
      - 🚀 手动切换
      - DIRECT

  - name: 🚀 手动切换
    type: select
    include-all: true

  - name: ♻️ 自动选择
    type: url-test
    include-all: true
    interval: 300
    tolerance: 50
    url: https://www.gstatic.com/generate_204

  # ===== AI =====
  - name: 🤖 AI服务
    type: select
    proxies:
      - 🇸🇬 狮城节点
      - 🇺🇸 美国节点
      - 🌍 其他国家节点
      - ♻️ 自动选择
      - 🚀 节点选择
      - 🚀 手动切换
      - DIRECT

  - name: 💬 OpenAI
    type: select
    proxies:
      - 🤖 AI服务
      - 🇸🇬 狮城节点
      - 🇺🇸 美国节点
      - 🌍 其他国家节点
      - ♻️ 自动选择
      - 🚀 手动切换
      - DIRECT

  - name: 🧠 Claude
    type: select
    proxies:
      - 🇺🇸 美国节点
      - 🤖 AI服务
      - 🇸🇬 狮城节点
      - 🌍 其他国家节点
      - ♻️ 自动选择
      - 🚀 手动切换
      - DIRECT

  - name: 🖱️ Cursor
    type: select
    proxies:
      - 🇺🇸 美国节点
      - 🤖 AI服务
      - 🇸🇬 狮城节点
      - 🌍 其他国家节点
      - ♻️ 自动选择
      - 🚀 手动切换
      - DIRECT

  - name: ✨ Gemini
    type: select
    proxies:
      - 🇺🇸 美国节点
      - 🤖 AI服务
      - 🇸🇬 狮城节点
      - 🌍 其他国家节点
      - ♻️ 自动选择
      - 🚀 手动切换
      - DIRECT

  # ===== 常规业务 =====
  - name: 📲 电报消息
    type: select
    proxies:
      - 🚀 节点选择
      - ♻️ 自动选择
      - 🇸🇬 狮城节点
      - 🇺🇸 美国节点
      - 🌍 其他国家节点
      - 🚀 手动切换
      - DIRECT

  - name: 📹 油管视频
    type: select
    proxies:
      - 🚀 节点选择
      - ♻️ 自动选择
      - 🇸🇬 狮城节点
      - 🇺🇸 美国节点
      - 🇭🇰 香港节点
      - 🇯🇵 日本节点
      - 🌍 其他国家节点
      - 🚀 手动切换
      - DIRECT

  - name: 🎥 奈飞视频
    type: select
    proxies:
      - 🇺🇸 美国节点
      - 🇸🇬 狮城节点
      - 🇭🇰 香港节点
      - 🇯🇵 日本节点
      - 🌍 其他国家节点
      - 🚀 节点选择
      - ♻️ 自动选择
      - 🚀 手动切换
      - DIRECT

  - name: 🌍 国外媒体
    type: select
    proxies:
      - 🚀 节点选择
      - ♻️ 自动选择
      - 🇺🇸 美国节点
      - 🇸🇬 狮城节点
      - 🇭🇰 香港节点
      - 🇯🇵 日本节点
      - 🌍 其他国家节点
      - 🚀 手动切换
      - DIRECT

  - name: 🌏 国内媒体
    type: select
    proxies:
      - DIRECT
      - 🇭🇰 香港节点
      - 🇸🇬 狮城节点
      - 🚀 手动切换

  - name: 🎯 全球直连
    type: select
    proxies:
      - DIRECT
      - 🚀 节点选择

  - name: 🛑 广告拦截
    type: select
    proxies:
      - REJECT
      - DIRECT

  - name: 🐟 漏网之鱼
    type: select
    proxies:
      - 🚀 节点选择
      - ♻️ 自动选择
      - 🇺🇸 美国节点
      - 🇸🇬 狮城节点
      - 🌍 其他国家节点
      - DIRECT

  # ===== 地区池 =====
  - name: 🇺🇸 美国节点
    type: url-test
    include-all: true
    filter: "(?i)(美|美国|US|USA|United States|America|Los Angeles|LA|San Jose|San Francisco|Seattle|Chicago|Dallas|New York|纽约|洛杉矶|硅谷|圣何塞|旧金山|西雅图|芝加哥|达拉斯)"
    interval: 300
    tolerance: 50
    url: https://www.gstatic.com/generate_204

  - name: 🇸🇬 狮城节点
    type: url-test
    include-all: true
    filter: "(?i)(新加坡|狮城|坡|SG|Singapore)"
    interval: 300
    tolerance: 50
    url: https://www.gstatic.com/generate_204

  - name: 🇭🇰 香港节点
    type: url-test
    include-all: true
    filter: "(?i)(香港|港|HK|Hong Kong|HKG)"
    interval: 300
    tolerance: 50
    url: https://www.gstatic.com/generate_204

  - name: 🇯🇵 日本节点
    type: url-test
    include-all: true
    filter: "(?i)(日本|日|JP|Japan|Tokyo|Osaka|东京|大阪)"
    interval: 300
    tolerance: 50
    url: https://www.gstatic.com/generate_204

  - name: 🇨🇳 台湾节点
    type: url-test
    include-all: true
    filter: "(?i)(台湾|台|TW|Taiwan|Taipei|台北)"
    interval: 300
    tolerance: 50
    url: https://www.gstatic.com/generate_204

  - name: 🇰🇷 韩国节点
    type: url-test
    include-all: true
    filter: "(?i)(韩国|韩|KR|Korea|Seoul|首尔)"
    interval: 300
    tolerance: 50
    url: https://www.gstatic.com/generate_204

  - name: 🌍 其他国家节点
    type: url-test
    include-all: true
    filter: "(?i)(UK|United Kingdom|英国|Germany|德国|France|法国|Canada|加拿大|Australia|澳大利亚|India|印度|Thailand|泰国|Vietnam|越南|Malaysia|马来西亚|Netherlands|荷兰|Turkey|土耳其|Brazil|巴西|Philippines|菲律宾|Indonesia|印尼)"
    interval: 300
    tolerance: 50
    url: https://www.gstatic.com/generate_204


