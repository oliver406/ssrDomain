proxy-groups:
  - name: 🚀 节点选择
    type: select
    proxies:
      - ♻️ 自动选择
      - 🇸🇬 狮城节点
      - 🇺🇲 美国节点
      - 🇭🇰 香港节点
      - 🇯🇵 日本节点
      - 🇨🇳 台湾节点
      - 🇰🇷 韩国节点
      - 🌍 其他国家节点
      - 🚀 手动切换
      - DIRECT

  - name: 🚀 手动切换
    include-all: true
    type: select

  - name: ♻️ 自动选择
    type: url-test
    include-all: true
    interval: 300
    tolerance: 50

  # ===== AI =====
  - name: 🤖 AI服务
    type: select
    proxies:
      - 🇸🇬 狮城节点
      - 🇺🇲 美国节点
      - 🌍 其他国家节点
      - ♻️ 自动选择
      - 🚀 节点选择
      - 🚀 手动切换
      - DIRECT

  - name: 💬 OpenAI
    type: select
    proxies:
      - 🤖 AI服务
      - 🇸🇬 狮城节点
      - 🇺🇲 美国节点
      - ♻️ 自动选择
      - 🚀 手动切换
      - DIRECT

  - name: 🧠 Claude
    type: select
    proxies:
      - 🇺🇲 美国节点
      - 🤖 AI服务
      - 🇸🇬 狮城节点
      - ♻️ 自动选择
      - 🚀 手动切换
      - DIRECT

  - name: 🖱️ Cursor
    type: select
    proxies:
      - 🇺🇲 美国节点
      - 🤖 AI服务
      - 🇸🇬 狮城节点
      - ♻️ 自动选择
      - 🚀 手动切换
      - DIRECT

  - name: ✨ Gemini
    type: select
    proxies:
      - 🇺🇲 美国节点
      - 🤖 AI服务
      - 🇸🇬 狮城节点
      - ♻️ 自动选择
      - 🚀 手动切换
      - DIRECT

  # ===== 常规业务 =====
  - name: 📲 电报消息
    type: select
    proxies:
      - 🚀 节点选择
      - ♻️ 自动选择
      - 🇸🇬 狮城节点
      - 🇺🇲 美国节点
      - 🌍 其他国家节点
      - 🚀 手动切换
      - DIRECT

  - name: 📹 油管视频
    type: select
    proxies:
      - 🚀 节点选择
      - ♻️ 自动选择
      - 🇸🇬 狮城节点
      - 🇺🇲 美国节点
      - 🌍 其他国家节点
      - 🚀 手动切换
      - DIRECT

  - name: 🎥 奈飞视频
    type: select
    proxies:
      - 🚀 节点选择
      - ♻️ 自动选择
      - 🇺🇲 美国节点
      - 🇸🇬 狮城节点
      - 🌍 其他国家节点
      - 🚀 手动切换
      - DIRECT

  - name: 🌍 国外媒体
    type: select
    proxies:
      - 🚀 节点选择
      - ♻️ 自动选择
      - 🇺🇲 美国节点
      - 🇸🇬 狮城节点
      - 🌍 其他国家节点
      - 🚀 手动切换
      - DIRECT

  - name: 🌏 国内媒体
    type: select
    proxies:
      - DIRECT
      - 🇸🇬 狮城节点
      - 🇭🇰 香港节点
      - 🚀 手动切换

  - name: 🎯 全球直连
    type: select
    proxies:
      - DIRECT
      - 🚀 节点选择

  - name: 🛑 广告拦截
    type: select
    proxies:
      - REJECT
      - DIRECT

  - name: 🐟 漏网之鱼
    type: select
    proxies:
      - 🚀 节点选择
      - ♻️ 自动选择
      - 🇺🇲 美国节点
      - 🇸🇬 狮城节点
      - DIRECT

  # ===== 地区池 =====
  - name: 🇺🇲 美国节点
    include-all: true
    filter: (?i)美|US|United States|America|洛杉矶|硅谷|西雅图|芝加哥|达拉斯
    type: url-test
    interval: 300
    tolerance: 50

  - name: 🇸🇬 狮城节点
    include-all: true
    filter: (?i)新加坡|SG|Singapore|坡|狮城
    type: url-test
    interval: 300
    tolerance: 50

  - name: 🇭🇰 香港节点
    include-all: true
    filter: (?i)HK|Hong Kong|香港
    type: url-test
    interval: 300
    tolerance: 50

  - name: 🇯🇵 日本节点
    include-all: true
    filter: (?i)JP|Japan|东京|大阪
    type: url-test
    interval: 300
    tolerance: 50

  - name: 🇨🇳 台湾节点
    include-all: true
    filter: (?i)TW|Taiwan|台
    type: url-test
    interval: 300
    tolerance: 50

  - name: 🇰🇷 韩国节点
    include-all: true
    filter: (?i)KR|Korea|首尔
    type: url-test
    interval: 300
    tolerance: 50

  - name: 🌍 其他国家节点
    include-all: true
    filter: (?i)UK|Germany|France|Canada|Australia|India|Thailand|Vietnam|Malaysia
    type: url-test
    interval: 300
    tolerance: 50

rules:
  # ===== AI =====
  - "DOMAIN-SUFFIX,chatgpt.com,💬 OpenAI"
  - "DOMAIN-SUFFIX,openai.com,💬 OpenAI"
  - "DOMAIN-SUFFIX,openai.ai,💬 OpenAI"
  - "DOMAIN-SUFFIX,oaistatic.com,💬 OpenAI"
  - "DOMAIN-SUFFIX,oaiusercontent.com,💬 OpenAI"
  - "DOMAIN-KEYWORD,chatgpt,💬 OpenAI"
  - "DOMAIN-KEYWORD,openai,💬 OpenAI"

  - "DOMAIN-SUFFIX,anthropic.com,🧠 Claude"
  - "DOMAIN-SUFFIX,claude.ai,🧠 Claude"
  - "DOMAIN-SUFFIX,claude.com,🧠 Claude"
  - "DOMAIN-KEYWORD,claude,🧠 Claude"

  - "DOMAIN-SUFFIX,cursor.com,🖱️ Cursor"
  - "DOMAIN-SUFFIX,cursor.sh,🖱️ Cursor"
  - "DOMAIN-KEYWORD,cursor,🖱️ Cursor"

  - "DOMAIN-SUFFIX,gemini.google.com,✨ Gemini"
  - "DOMAIN-SUFFIX,generativelanguage.googleapis.com,✨ Gemini"
  - "DOMAIN-KEYWORD,gemini,✨ Gemini"

  # ===== 兜底 =====
  - "GEOIP,CN,🎯 全球直连"
  - "MATCH,🐟 漏网之鱼"
