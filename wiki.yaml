proxy-groups: #!replace

  - name: PROXY
    type: select
    proxies:
      - AUTO
      - US
      - SG
      - HK
      - JP
      - TW
      - KR
      - DIRECT

  - name: AUTO
    type: url-test
    include-all: true
    url: https://www.gstatic.com/generate_204
    interval: 300
    tolerance: 50

  # ===== 节点池 =====
  - name: US
    type: url-test
    include-all: true
    filter: "(?i)(US|USA|America|美国|洛杉矶|纽约|硅谷)"
    url: https://www.gstatic.com/generate_204
    interval: 300

  - name: SG
    type: url-test
    include-all: true
    filter: "(?i)(SG|Singapore|新加坡)"
    url: https://www.gstatic.com/generate_204
    interval: 300

  - name: HK
    type: url-test
    include-all: true
    filter: "(?i)(HK|Hong Kong|香港)"
    url: https://www.gstatic.com/generate_204
    interval: 300

  - name: JP
    type: url-test
    include-all: true
    filter: "(?i)(JP|Japan|日本|东京|大阪)"
    url: https://www.gstatic.com/generate_204
    interval: 300

  - name: TW
    type: url-test
    include-all: true
    filter: "(?i)(TW|Taiwan|台湾)"
    url: https://www.gstatic.com/generate_204
    interval: 300

  - name: KR
    type: url-test
    include-all: true
    filter: "(?i)(KR|Korea|韩国|首尔)"
    url: https://www.gstatic.com/generate_204
    interval: 300

  # ===== fallback =====
  - name: FINAL
    type: select
    proxies:
      - PROXY
      - DIRECT
